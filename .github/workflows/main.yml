name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Настройки за обход на организация и Private проекти
          base_indepth: yes
          config_timezone: Europe/Sofia
          repositories_batch: 50
          repositories_affiliations: owner
          
          # Плъгин за контрибютори (Списък с данни)
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          plugin_contributors_limit: 15
          
          # Плъгин за хора (Визуален списък с аватари)
          # Този плъгин често работи по-добре за Private организации
          plugin_people: yes
          plugin_people_types: contributors
          plugin_people_limit: 28
          plugin_people_size: 28
