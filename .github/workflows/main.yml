name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          template: classic
          base: header, activity, community, repositories, metadata # Включваме базата, за да сме сигурни, че ще напълни SVG-то
          
          # КРИТИЧНО ЗА ОРГАНИЗАЦИИ И PRIVATE REPOS:
          base_entity_user: no
          config_allow_variant_repositories: yes
          repositories_affiliations: owner, collaborator
          repositories_batch: 10
          
          # Плъгин за контрибютори
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          
          # Плъгин за хора
          plugin_people: yes
          plugin_people_types: contributors
          plugin_people_limit: 24
