name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          template: classic
          base: header, activity, metadata
          
          # Настройки за Private Org
          repositories_affiliations: owner
          repositories_batch: 50
          
          # Плъгин за контрибютори (Основен)
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          plugin_contributors_limit: 15
          
          # Плъгин за хора (Визуален)
          plugin_people: yes
          plugin_people_types: contributors
          plugin_people_limit: 28
