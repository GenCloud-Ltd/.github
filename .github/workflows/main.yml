name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновява се всяка нощ
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          base: ""
          target: organization
          template: repository
          
          # Настройки за частни и много репозиторита
          config_allow_variant_repositories: yes
          repositories_batch: 100
          config_timezone: Europe/Sofia
          
          # Плъгин за контрибютори
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          plugin_contributors_limit: 10 # Колко души да показва (можеш да го увеличиш)
