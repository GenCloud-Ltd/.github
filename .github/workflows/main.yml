name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          template: classic
          base: header, activity, community, repositories, metadata
          
          # ТОВА ФИКСИРА ОРГАНИЗАЦИЯТА
          base_entity_user: no             # Казваме, че не е личен профил
          repositories_affiliations: owner # Гледаме само проекти на организацията
          config_allow_variant_repositories: yes
          
          # Плъгин за контрибютори (Класация)
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          plugin_contributors_limit: 15
          
          # Плъгин за хора (Аватари)
          plugin_people: yes
          plugin_people_types: contributors
          plugin_people_limit: 24
          
          # Настройки за обход на Private Repo
          repositories_batch: 10
