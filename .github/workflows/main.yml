name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновява се всяка нощ в 00:00
  workflow_dispatch: # Позволява ръчно пускане
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GenCloud-Ltd
          base: ""
          template: classic
          
          # Основни настройки
          config_timezone: Europe/Sofia
          repositories_batch: 20 # Оптимално за скорост
          
          # Плъгин за контрибютори (Класация по комити)
          plugin_contributors: yes
          plugin_contributors_contributions: yes
          plugin_contributors_sections: contributors
          plugin_contributors_categories: commits
          
          # Добавяме и визуален списък с аватари на хората
          plugin_people: yes
          plugin_people_types: contributors
          plugin_people_limit: 28
          plugin_people_size: 28
